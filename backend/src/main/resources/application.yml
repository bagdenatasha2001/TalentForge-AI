server:
  port: 8080

spring:
  application:
    name: talentforge-backend

  # PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/talentforge
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10

  # SQL Init — runs schema.sql BEFORE Hibernate and DataSeeder
  sql:
    init:
      mode: always
      platform: postgresql

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          lob:
            non_contextual_creation: true

  # MongoDB Configuration
  data:
    mongodb:
      uri: mongodb://localhost:27017/talentforge

  # Mail Configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true 
          starttls:
            enable: true
            required: true
        debug: false

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000  # 24 hours in milliseconds

# AI Engine URL
ai:
  engine:
    url: http://localhost:8000

# OTP Configuration
otp:
  expiry-minutes: 10
  length: 6

# Logging
logging:
  level:
    com.talentforge: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
